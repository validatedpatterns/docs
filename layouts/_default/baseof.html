<!DOCTYPE html>
<html{{ with $.Site.LanguageCode }} lang="{{ . }}"{{ end }}>
    {{- partial "head.html" . -}}
    <body>
        <div class="pf-c-page">
        {{- partial "header.html" . -}}
        {{- block "main" . }}
        <!-- get all the things from the content files -->
        {{- end }}
        </div>
        <script src="{{ "js/codeblock.js"  | relURL }}"></script>
        <script src="{{ "js/mobile-nav.js"  | relURL }}"></script>
        <script src="{{ "js/page-actions.js"  | relURL }}"></script>
        {{ if .Store.Get "hasMermaid" }}
        <script type="module">
            import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
            mermaid.initialize({ startOnLoad: true });
        </script>
        {{ end }}
    </body>
    <!-- Uncomment when you have sorted out the feedback partials option
        <body>
        {{ if .Params.links.feedback }}
        {{ partial "feedback-form.html" . }}
        {{ else }}
        <p>{{ .Params.links.feedback }}</p>
        {{ end }}
    </body>-->
</html>
